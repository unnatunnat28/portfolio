# Netlify Configuration for Frontend Deployment

[build]
  base = "client"
  command = "npm install && npm run build"
  publish = "build"

# Redirect API calls to backend
[[redirects]]
  from = "/api/*"
  to = "https://your-backend-url.onrender.com/api/:splat"
  status = 200
  force = true

# Redirect all non-file requests to index.html (for React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables for build
[env.production]
  environment = { REACT_APP_API_URL = "https://your-backend-url.onrender.com" }

# Increase timeout for API calls
[functions]

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"

# Caching rules
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "index.html"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"
